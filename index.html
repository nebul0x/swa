<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azure AI Search Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0078d4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #0078d4;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }

    h1 {
      font-size: 22px;
      color: #1a1a1a;
    }

    p.subtitle {
      color: #666;
      margin-bottom: 28px;
      font-size: 14px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #0078d4; }

    button {
      padding: 12px 24px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #005fa3; }

    .results { display: none; }

    .result-item {
      padding: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 12px;
      transition: box-shadow 0.2s;
    }

    .result-item:hover { box-shadow: 0 2px 8px rgba(0,120,212,0.15); }

    .result-item h3 { color: #0078d4; margin-bottom: 4px; }
    .result-item p { color: #555; font-size: 14px; }

    .badge {
      display: inline-block;
      background: #e8f4ff;
      color: #0078d4;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 6px;
    }

    .powered {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔍</div>
      <div>
        <h1>Azure AI Search Demo</h1>
      </div>
    </div>
    <p class="subtitle">Suche powered by Microsoft Azure – AZW Schul-Projekt</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="z.B. Cloud, Azure, Datenbank..." />
      <button onclick="search()">Suchen</button>
    </div>

    <div class="results" id="results"></div>

    <div class="powered">⚡ Powered by Azure Static Web Apps + Azure AI Search</div>
  </div>

  <script>
    // Demo-Daten (simuliert Azure AI Search Ergebnisse)
    const demoData = [
      { title: "Azure Container Apps", desc: "Skalierbare Container ohne Serververwaltung. Ideal für Microservices.", tag: "Compute" },
      { title: "Azure Static Web Apps", desc: "Statische Webseiten direkt aus GitHub deployen. HTTPS inklusive.", tag: "Web" },
      { title: "Azure AI Search", desc: "KI-gestützte Suchfunktion für Ihre Daten. Unterstützt Volltextsuche.", tag: "KI" },
      { title: "Azure Cosmos DB", desc: "Global verteilte NoSQL-Datenbank mit millisekunden Antwortzeiten.", tag: "Datenbank" },
      { title: "Azure Functions", desc: "Serverless Code ausführen – zahle nur was du nutzt.", tag: "Serverless" },
      { title: "Azure Virtual Machines", desc: "Virtuelle Maschinen in der Cloud – vollständige Kontrolle.", tag: "IaaS" },
      { title: "Azure OpenAI", desc: "ChatGPT und GPT-4 in eigenen Applikationen nutzen.", tag: "KI" },
      { title: "Azure Blob Storage", desc: "Unbegrenzt Dateien und Bilder in der Cloud speichern.", tag: "Storage" },
    ];

    function search() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const resultsDiv = document.getElementById('results');

      if (!query) {
        resultsDiv.style.display = 'none';
        return;
      }

      const filtered = demoData.filter(item =>
        item.title.toLowerCase().includes(query) ||
        item.desc.toLowerCase().includes(query) ||
        item.tag.toLowerCase().includes(query)
      );

      resultsDiv.style.display = 'block';

      if (filtered.length === 0) {
        resultsDiv.innerHTML = '<p style="color:#999;text-align:center;">Keine Ergebnisse gefunden.</p>';
        return;
      }

      resultsDiv.innerHTML = filtered.map(item => `
        <div class="result-item">
          <h3>${item.title}</h3>
          <p>${item.desc}</p>
          <span class="badge">${item.tag}</span>
        </div>
      `).join('');
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
